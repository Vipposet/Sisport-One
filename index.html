<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SisPort - Gestão de Fluxo Portaria-RH</title>
    <style>
        :root {
            --primary: #0056b3;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333;
            --border: #ddd;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --info: #17a2b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary);
        }

        header p {
            color: #666;
            font-size: 0.9em;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .panel-large {
            max-width: 100%;
        }

        .panel h2 {
            font-size: 1.2em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-bottom: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-small {
            width: auto;
            padding: 5px 10px;
            font-size: 0.8em;
            margin-top: 5px;
            margin-right: 5px;
            margin-bottom: 0;
        }
        
        .btn-outline {
            background-color: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-info { background-color: var(--info); }
        .btn-approve { background-color: var(--success); }
        .btn-reject { background-color: var(--danger); }
        .btn-action { background-color: var(--warning); color: #000; }
        .btn-voltar { background-color: #6c757d; font-size: 0.8em; padding: 5px 10px; width: auto; margin-bottom: 0; }

        .card-item {
            background: #f9f9f9;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .status {
            font-weight: bold;
            font-size: 0.8em;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .status-pendente { background: #ffeeba; color: #856404; }
        .status-aprovado { background: #d4edda; color: #155724; }
        .status-ausente { background: #f8d7da; color: #721c24; }
        .status-concluido { background: #e2e3e5; color: #383d41; }
        .status-rejeitado { background: #f8d7da; color: #721c24; }

        .categoria-titulo {
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 1.05em;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
            text-transform: capitalize;
        }

        /* Classe principal para esconder elementos */
        .escondido { display: none !important; }

        .menu-inicial {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            text-align: center;
        }

        .menu-inicial button {
            padding: 15px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <header>
        <h1>SisPort</h1>
        <p>Sistema Digital Integrado de Controle de Fluxo e Solicitações</p>
    </header>

    <div class="container">
        
        <div class="panel" id="tela-menu">
            <h2>Selecione seu Perfil</h2>
            <div class="menu-inicial">
                <button id="btn-ver-status" class="btn-info escondido" onclick="abrirStatus()">Ver Status do Pedido Atual</button>
                
                <button onclick="abrirFormulario()">Fazer Nova Solicitação</button>
                <button class="btn-outline" onclick="abrirLogin()" style="border-color: var(--primary); color: var(--primary);">Acesso da Gestão (Login)</button>
            </div>
        </div>

        <div class="panel escondido" id="tela-formulario">
            <h2>
                Nova Solicitação
                <button class="btn-voltar" onclick="voltarMenu()">Voltar</button>
            </h2>
            <div class="form-group">
                <label for="nome">Nome do Colaborador:</label>
                <input type="text" id="nome" placeholder="Ex: João Silva">
            </div>
            <div class="form-group">
                <label for="motivo">Motivo da Saída:</label>
                <select id="motivo" onchange="checarMotivoOutro()">
                    <option value="Consulta Médica">Consulta Médica</option>
                    <option value="Serviço Externo">Serviço Externo</option>
                    <option value="Assunto Particular">Assunto Particular</option>
                    <option value="Consulta de Equipamento">Consulta de Equipamento</option>
                    <option value="Outro">Outro (Especificar...)</option>
                </select>
            </div>
            <div class="form-group escondido" id="div-motivo-outro">
                <label for="motivo-outro">Especifique o Motivo:</label>
                <input type="text" id="motivo-outro" placeholder="Digite o motivo aqui...">
            </div>
            <button onclick="solicitarSaida()">Enviar Solicitação</button>
        </div>

        <div class="panel escondido" id="tela-status">
            <h2>
                Seu Status
                <button class="btn-voltar" onclick="voltarMenu()">Início</button>
            </h2>
            <div id="meu-status-detalhes" class="card-item" style="text-align: center; padding: 20px;">
                </div>
            <button class="btn-outline" onclick="abrirFormulario()">Fazer Outra Solicitação</button>
        </div>


        <div class="panel escondido" id="tela-login">
            <h2>
                Acesso Restrito
                <button class="btn-voltar" onclick="voltarMenu()">Voltar</button>
            </h2>
            <div class="form-group">
                <label for="senha">Senha do Gestor:</label>
                <input type="password" id="senha" placeholder="Digite a senha...">
            </div>
            <button onclick="fazerLogin()">Entrar</button>
        </div>

        <div class="panel gestao-painel escondido">
            <h2>
                RH (Aprovações)
                <button class="btn-voltar" onclick="voltarMenu()" style="background: var(--danger);">Sair</button>
            </h2>
            <div id="lista-rh"></div>
        </div>

        <div class="panel gestao-painel escondido">
            <h2>Portaria (Controle)</h2>
            <div id="lista-portaria"></div>
        </div>

        <div class="panel panel-large gestao-painel escondido">
            <h2>Relatório em Tempo Real (Categorizado)</h2>
            <div id="lista-historico"></div>
        </div>

    </div>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy } 
    from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBcB4LAcfqDQ3-8EeG2GSzbH-IQXcHFfyQ",
        authDomain: "sisport-a6d74.firebaseapp.com",
        projectId: "sisport-a6d74",
        storageBucket: "sisport-a6d74.firebasestorage.app",
        messagingSenderId: "1035034399045",
        appId: "1:1035034399045:web:413cfefbd6b479a6dbae2c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "solicitacoes");

    let solicitacoes = [];
    const SENHA_ADMIN = "12345"; 
    
    // Variável para saber em qual tela estamos e não atualizar coisas na hora errada
    let telaAtual = "menu"; 

    function getHoraAtual() {
        return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    onSnapshot(query(colRef, orderBy("id", "asc")), (snapshot) => {
        solicitacoes = [];
        snapshot.docs.forEach(documento => {
            solicitacoes.push({ ...documento.data(), docId: documento.id });
        });
        
        atualizarBotoesMenu(); // Checa se deve mostrar o botão "Ver status"

        if (telaAtual === "gestao") atualizarTelasGestao();
        if (telaAtual === "status") renderizarTelaStatus();
    });

    // ================= NAVEGAÇÃO DE TELAS =================
    
    function esconderTudo() {
        document.getElementById('tela-menu').classList.add('escondido');
        document.getElementById('tela-formulario').classList.add('escondido');
        document.getElementById('tela-status').classList.add('escondido');
        document.getElementById('tela-login').classList.add('escondido');
        document.querySelectorAll('.gestao-painel').forEach(p => p.classList.add('escondido'));
    }

    window.voltarMenu = function() {
        esconderTudo();
        telaAtual = "menu";
        document.getElementById('tela-menu').classList.remove('escondido');
        document.getElementById('senha').value = ''; 
        atualizarBotoesMenu();
    }

    window.abrirLogin = function() {
        esconderTudo();
        telaAtual = "login";
        document.getElementById('tela-login').classList.remove('escondido');
    }

    window.abrirFormulario = function() {
        esconderTudo();
        telaAtual = "formulario";
        document.getElementById('tela-formulario').classList.remove('escondido');
        
        // Reseta o campo 'Outro' sempre que abrir
        document.getElementById('motivo').value = 'Consulta Médica';
        checarMotivoOutro();
    }

    window.abrirStatus = function() {
        esconderTudo();
        telaAtual = "status";
        document.getElementById('tela-status').classList.remove('escondido');
        renderizarTelaStatus();
    }

    function atualizarBotoesMenu() {
        const meuId = localStorage.getItem("minhaSolicitacaoId");
        if (meuId) {
            document.getElementById('btn-ver-status').classList.remove('escondido');
        } else {
            document.getElementById('btn-ver-status').classList.add('escondido');
        }
    }

    // ================= SISTEMA DE LOGIN (GESTOR) =================
    
    window.fazerLogin = function() {
        const senhaDigitada = document.getElementById('senha').value;
        if (senhaDigitada === SENHA_ADMIN) {
            esconderTudo();
            telaAtual = "gestao";
            document.querySelectorAll('.gestao-painel').forEach(p => p.classList.remove('escondido'));
            atualizarTelasGestao();
        } else {
            alert("Senha incorreta! Tente novamente.");
        }
    };

    // ================= SISTEMA DO COLABORADOR =================

    window.checarMotivoOutro = function() {
        const motivo = document.getElementById('motivo').value;
        const divOutro = document.getElementById('div-motivo-outro');
        if (motivo === 'Outro') {
            divOutro.classList.remove('escondido');
        } else {
            divOutro.classList.add('escondido');
        }
    }
    
    window.solicitarSaida = async function() {
        const nome = document.getElementById('nome').value;
        let motivo = document.getElementById('motivo').value;

        if (!nome) {
            alert("Por favor, insira o nome do colaborador.");
            return;
        }

        // Puxa o texto se a opção for "Outro"
        if (motivo === 'Outro') {
            motivo = document.getElementById('motivo-outro').value.trim();
            if (!motivo) {
                alert("Por favor, especifique o motivo.");
                return;
            }
        }

        const novaSolicitacao = {
            id: Date.now(),
            nome: nome,
            motivo: motivo,
            status: 'PENDENTE',
            horaSolicitada: getHoraAtual(),
            horaSaida: null,
            horaRetorno: null,
            motivoRejeicao: null
        };

        const docRef = await addDoc(colRef, novaSolicitacao);
        
        // Só substitui a memória do celular DEPOIS de enviar com sucesso
        localStorage.setItem("minhaSolicitacaoId", docRef.id);
        
        document.getElementById('nome').value = ''; 
        document.getElementById('motivo-outro').value = ''; 
        abrirStatus(); // Vai direto ver o pedido
    };

    function renderizarTelaStatus() {
        const meuId = localStorage.getItem("minhaSolicitacaoId");
        const detalhesStatus = document.getElementById('meu-status-detalhes');

        if (meuId) {
            const minhaSol = solicitacoes.find(s => s.docId === meuId);
            if (minhaSol) {
                let classeStatus = 
                    minhaSol.status === 'CONCLUIDO' ? 'status-concluido' : 
                    minhaSol.status === 'REJEITADO' ? 'status-rejeitado' : 
                    minhaSol.status === 'PENDENTE' ? 'status-pendente' : 
                    minhaSol.status === 'APROVADO' ? 'status-aprovado' : 'status-ausente';

                let motivoRejeicao = minhaSol.status === 'REJEITADO' 
                    ? `<br><br><span style="color: red;"><strong>Motivo da Recusa:</strong><br>${minhaSol.motivoRejeicao}</span>` 
                    : '';

                detalhesStatus.innerHTML = `
                    <h3>Olá, ${minhaSol.nome}</h3>
                    <p style="margin-top: 5px; color: #666;">Motivo: ${minhaSol.motivo}</p>
                    <p style="margin-top: 15px;">Sua solicitação está:</p>
                    <div style="font-size: 1.5em; margin: 15px 0; display: inline-block;" class="status ${classeStatus}">
                        ${minhaSol.status}
                    </div>
                    ${motivoRejeicao}
                `;
            } else {
                detalhesStatus.innerHTML = "<p>Solicitação não encontrada no sistema.</p>";
            }
        }
    }

    // ================= FUNÇÕES DO GESTOR =================
    
    window.avaliar = async function(docId, acao) {
        const docRef = doc(db, "solicitacoes", docId);
        if (acao === 'aprovar') {
            await updateDoc(docRef, { status: 'APROVADO' });
        } else if (acao === 'rejeitar') {
            let motivo = prompt("Escreva o motivo da rejeição (Opcional):");
            if (motivo !== null) { 
                await updateDoc(docRef, { 
                    status: 'REJEITADO',
                    motivoRejeicao: motivo.trim() !== '' ? motivo : 'Sem justificativa'
                });
            }
        }
    };

    window.registrarPortaria = async function(docId, acao) {
        const docRef = doc(db, "solicitacoes", docId);
        if (acao === 'saida') {
            await updateDoc(docRef, { status: 'AUSENTE', horaSaida: getHoraAtual() });
        } else if (acao === 'retorno') {
            await updateDoc(docRef, { status: 'CONCLUIDO', horaRetorno: getHoraAtual() });
        }
    };

    function atualizarTelasGestao() {
        const listaRh = document.getElementById('lista-rh');
        const listaPortaria = document.getElementById('lista-portaria');
        const listaHistorico = document.getElementById('lista-historico');

        listaRh.innerHTML = '';
        listaPortaria.innerHTML = '';
        
        let rhVazio = true;
        let portariaVazia = true;

        const solicitacoesReversas = [...solicitacoes].reverse();

        solicitacoesReversas.forEach(s => {
            if (s.status === 'PENDENTE') {
                rhVazio = false;
                listaRh.innerHTML += `
                    <div class="card-item">
                        <strong>${s.nome}</strong><br>
                        Motivo: ${s.motivo}<br>
                        <span class="status status-pendente">Aguardando Avaliação</span><br>
                        <button class="btn-small btn-approve" onclick="avaliar('${s.docId}', 'aprovar')">Aprovar</button>
                        <button class="btn-small btn-reject" onclick="avaliar('${s.docId}', 'rejeitar')">Rejeitar</button>
                    </div>
                `;
            }

            if (s.status === 'APROVADO' || s.status === 'AUSENTE') {
                portariaVazia = false;
                let botoesPortaria = s.status === 'APROVADO' 
                    ? `<button class="btn-small btn-action" onclick="registrarPortaria('${s.docId}', 'saida')">Registrar Saída</button>`
                    : `<button class="btn-small" style="background:#555; color:#fff;" onclick="registrarPortaria('${s.docId}', 'retorno')">Registrar Retorno</button>`;

                let statusClass = s.status === 'APROVADO' ? 'status-aprovado' : 'status-ausente';
                let statusText = s.status === 'APROVADO' ? 'Liberado p/ Sair' : 'Fora da Empresa';

                listaPortaria.innerHTML += `
                    <div class="card-item">
                        <strong>${s.nome}</strong><br>
                        <span class="status ${statusClass}">${statusText}</span><br>
                        ${botoesPortaria}
                    </div>
                `;
            }
        });

        // Histórico Dinâmico (Lida com qualquer motivo digitado)
        let historicoHTML = '';
        const motivosUsados = [...new Set(solicitacoesReversas.map(s => s.motivo))]; // Pega motivos únicos

        motivosUsados.forEach(motivoCategoria => {
            const itens = solicitacoesReversas.filter(s => s.motivo === motivoCategoria);
            
            if (itens.length > 0) {
                historicoHTML += `<h3 class="categoria-titulo">${motivoCategoria}</h3>`;
                
                itens.forEach(s => {
                    let classeStatusHist = 
                        s.status === 'CONCLUIDO' ? 'status-concluido' : 
                        s.status === 'REJEITADO' ? 'status-rejeitado' : 
                        s.status === 'PENDENTE' ? 'status-pendente' : 
                        s.status === 'APROVADO' ? 'status-aprovado' : 'status-ausente';

                    let infoRejeicao = s.status === 'REJEITADO' 
                        ? `<br><small style="color: var(--danger);"><strong>Motivo:</strong> ${s.motivoRejeicao}</small>` 
                        : '';

                    historicoHTML += `
                        <div class="card-item">
                            <strong>${s.nome}</strong> <span class="status ${classeStatusHist}">${s.status}</span><br>
                            <small style="color:#666;">
                                Solicitado: ${s.horaSolicitada} 
                                ${s.horaSaida ? '| Saída: ' + s.horaSaida : ''} 
                                ${s.horaRetorno ? '| Retorno: ' + s.horaRetorno : ''}
                            </small>
                            ${infoRejeicao}
                        </div>
                    `;
                });
            }
        });

        listaHistorico.innerHTML = motivosUsados.length > 0 ? historicoHTML : '<p style="font-size: 0.9em; color: #666;">Sem movimentações.</p>';
        if (rhVazio) listaRh.innerHTML = '<p style="font-size: 0.9em; color: #666;">Nenhuma solicitação pendente.</p>';
        if (portariaVazia) listaPortaria.innerHTML = '<p style="font-size: 0.9em; color: #666;">Aguardando liberações...</p>';
    }
</script>
</body>
</html>
